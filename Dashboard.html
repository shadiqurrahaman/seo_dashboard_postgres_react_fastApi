<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Growmos · Paid Media Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f6f7f8;
    --border: #ececef;
    --border-strong: #e0e0e4;
    --text: #0a0a0c;
    --text-2: #52525b;
    --text-3: #8a8a93;
    --accent-1: #0ea5e9;
    --accent-2: #06b6d4;
    --accent-grad: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
    --accent-soft: linear-gradient(135deg, rgba(14,165,233,0.10), rgba(6,182,212,0.06));
    --pos: #059669;
    --pos-soft: #ecfdf5;
    --neg: #e11d48;
    --neg-soft: #fff1f2;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 16px -4px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-width: 1280px; }
  button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; padding: 0; }
  .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  ::selection { background: rgba(14,165,233,0.18); }

  #root { display: flex; min-height: 100vh; }

  .sidebar {
    width: 232px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 22px 16px;
    display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px; }
  .brand-mark { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-grad); position: relative; }
  .brand-mark::after { content: ''; position: absolute; inset: 6px; border-radius: 3px; border: 2px solid #fff; border-right-color: transparent; border-bottom-color: transparent; transform: rotate(45deg); }
  .brand-name { font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }
  .nav-group-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); padding: 12px 10px 6px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 8px; font-size: 13.5px; color: var(--text-2); font-weight: 500; cursor: pointer; transition: background 120ms; user-select: none; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--surface-2); color: var(--text); font-weight: 600; }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-3); }
  .nav-item.active .nav-icon { color: var(--accent-1); }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); opacity: 0; margin-left: auto; }
  .nav-item.active .nav-dot { opacity: 1; background: var(--accent-grad); }
  .sidebar-footer { margin-top: auto; padding: 12px 8px 0; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #fef3c7, #fde68a); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #92400e; font-size: 12px; }
  .avatar-info { font-size: 12.5px; line-height: 1.3; }
  .avatar-info .name { font-weight: 600; }
  .avatar-info .role { color: var(--text-3); font-size: 11.5px; }

  .main { flex: 1; min-width: 0; }
  .topbar {
    height: 60px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 28px; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .breadcrumb { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
  .breadcrumb b { color: var(--text); font-weight: 600; }
  .search { margin-left: auto; position: relative; }
  .search input { width: 260px; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); font: inherit; font-size: 13px; outline: none; transition: all 150ms; color: var(--text); }
  .search input:focus { background: #fff; border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(14,165,233,0.12); }
  .search .ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-2); position: relative; transition: background 120ms; }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn .badge { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-grad); border: 2px solid var(--surface); }

  .content { padding: 24px 28px 40px; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; gap: 24px; flex-wrap: wrap; }
  .page-head h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .page-head .sub { color: var(--text-3); font-size: 13px; }
  .controls { display: flex; gap: 8px; align-items: center; position: relative; }
  .ctrl { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 8px; transition: all 120ms; font-weight: 500; }
  .ctrl:hover { border-color: var(--border-strong); background: #fff; }
  .ctrl.open { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(14,165,233,0.10); }
  .ctrl .caret { color: var(--text-3); }
  .ctrl-primary { background: var(--accent-grad); color: #fff; border: none; padding: 8px 14px; font-weight: 600; }
  .ctrl-primary:hover { filter: brightness(1.05); }

  .popover { position: absolute; top: calc(100% + 6px); background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow-md); z-index: 50; min-width: 180px; padding: 6px; }
  .pop-item { padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .pop-item:hover { background: var(--surface-2); }
  .pop-item .check { color: var(--accent-1); opacity: 0; }
  .pop-item.selected .check { opacity: 1; }

  .grid { display: grid; gap: 16px; }
  .kpi-row { grid-template-columns: repeat(4, 1fr); }
  .main-row { grid-template-columns: 2fr 1fr; }
  .bottom-row { grid-template-columns: 1.5fr 1fr; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .card-title { font-size: 13.5px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; font-weight: 500; }
  .card-actions { display: flex; gap: 4px; }

  .kpi { padding: 16px 18px 14px; }
  .kpi.featured { position: relative; overflow: hidden; }
  .kpi.featured::before { content: ''; position: absolute; inset: 0; background: var(--accent-soft); pointer-events: none; }
  .kpi-label { font-size: 12px; color: var(--text-3); font-weight: 500; display: flex; align-items: center; gap: 6px; position: relative; }
  .kpi-label .dot-grad { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-grad); }
  .kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -0.025em; margin-top: 8px; position: relative; font-family: 'JetBrains Mono', monospace; }
  .kpi.featured .kpi-value { background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .kpi-meta { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; position: relative; }
  .delta { display: inline-flex; align-items: center; gap: 3px; padding: 3px 7px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
  .delta.pos { background: var(--pos-soft); color: var(--pos); }
  .delta.neg { background: var(--neg-soft); color: var(--neg); }
  .spark { width: 84px; height: 28px; }
  .vs { font-size: 11px; color: var(--text-3); margin-left: 6px; font-weight: 500; }

  .tabs { display: inline-flex; background: var(--surface-2); border-radius: 8px; padding: 3px; gap: 2px; }
  .tab { padding: 6px 12px; font-size: 12.5px; border-radius: 6px; color: var(--text-2); font-weight: 500; transition: all 120ms; }
  .tab.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
  .tab:hover:not(.active) { color: var(--text); }

  .legend { display: flex; gap: 14px; font-size: 12px; color: var(--text-2); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 9px; height: 9px; border-radius: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 600; color: var(--text-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 100ms; cursor: pointer; }
  tbody tr:hover { background: var(--surface-2); }
  th.r, td.r { text-align: right; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 6px; font-size: 11.5px; font-weight: 500; background: var(--surface-2); color: var(--text-2); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.active { background: var(--pos); box-shadow: 0 0 0 2px var(--pos-soft); }
  .status-dot.paused { background: #d4d4d8; }
  .status-dot.review { background: #f59e0b; box-shadow: 0 0 0 2px #fef3c7; }

  .funnel-row { display: grid; grid-template-columns: 110px 1fr 90px 64px; gap: 12px; align-items: center; padding: 9px 0; }
  .funnel-label { font-size: 12.5px; color: var(--text-2); font-weight: 500; }
  .funnel-bar { height: 26px; background: var(--surface-2); border-radius: 6px; overflow: hidden; position: relative; }
  .funnel-fill { height: 100%; border-radius: 6px; transition: width 700ms cubic-bezier(0.4, 0, 0.2, 1); }
  .funnel-val { font-size: 13px; font-weight: 600; text-align: right; font-family: 'JetBrains Mono', monospace; }
  .funnel-pct { font-size: 11.5px; color: var(--text-3); text-align: right; font-family: 'JetBrains Mono', monospace; }

  .donut-wrap { position: relative; width: 180px; height: 180px; margin: 4px auto 0; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-total { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; font-family: 'JetBrains Mono', monospace; }
  .donut-label { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

  .stack-row { display: flex; align-items: flex-end; gap: 7px; height: 220px; margin-top: 4px; padding: 0 2px; }
  .stack-col { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; min-width: 0; position: relative; cursor: pointer; }
  .stack-seg { border-radius: 2px; transition: opacity 120ms; min-height: 1px; }
  .stack-seg:first-child { border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
  .stack-col:hover .stack-seg { opacity: 0.7; }
  .stack-x { display: flex; gap: 7px; padding: 8px 2px 0; }
  .stack-x span { flex: 1; text-align: center; font-size: 10.5px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

  .kw-row { display: grid; grid-template-columns: 1fr 70px 90px 60px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .kw-row:last-child { border-bottom: none; }
  .kw-term { font-size: 13px; color: var(--text); font-weight: 500; display: flex; align-items: center; gap: 8px; min-width: 0; }
  .kw-term-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kw-rank { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; text-align: center; }
  .kw-volume { font-size: 12px; color: var(--text-3); text-align: right; font-family: 'JetBrains Mono', monospace; }
  .kw-delta { font-size: 11.5px; font-weight: 600; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }

  .anomaly { display: flex; gap: 12px; padding: 12px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); margin-bottom: 8px; align-items: flex-start; }
  .anomaly:last-child { margin-bottom: 0; }
  .anomaly-ico { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .anomaly.warn .anomaly-ico { background: #fef3c7; color: #b45309; }
  .anomaly.pos .anomaly-ico { background: var(--pos-soft); color: var(--pos); }
  .anomaly.info .anomaly-ico { background: rgba(14,165,233,0.12); color: var(--accent-1); }
  .anomaly-body { flex: 1; font-size: 12.5px; line-height: 1.45; }
  .anomaly-body b { font-weight: 600; }
  .anomaly-time { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  .relative { position: relative; }
  .hidden { display: none !important; }
  .chart-wrap { position: relative; }

  .channel-legend { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .ch-leg-row { display: grid; grid-template-columns: 10px 1fr 64px 44px; gap: 10px; align-items: center; font-size: 12.5px; padding: 4px 0; cursor: pointer; }
  .ch-leg-row:hover .ch-name { color: var(--text); }
  .ch-name { color: var(--text-2); font-weight: 500; }
  .ch-val { text-align: right; font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
  .ch-pct { text-align: right; color: var(--text-3); font-size: 11.5px; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
